<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludópatas FC - Elite Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto+Mono:ital,wght@1,300&display=swap');

        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --gold: #d4af37;
            --red: #ff4d4d;
            --green: #2ecc71;
            --blue: #3498db;
            --neutral: #888;
            --text: #ffffff;
            --border: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 950px; }

        header {
            text-align: center;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        header h1 { 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin: 0; 
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .credits {
            font-family: 'Roboto Mono', monospace;
            font-style: italic;
            font-weight: 300;
            font-size: 0.65rem;
            color: #444;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        .suits { font-size: 1rem; color: var(--gold); opacity: 0.5; margin-bottom: 5px; }

        .session-info { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .info-input {
            background: #222; border: 1px solid var(--border); border-radius: 20px;
            color: var(--gold); padding: 8px 12px; font-size: 0.75rem; text-align: center; width: 45%;
        }

        .main-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 850px) { .main-grid { grid-template-columns: 320px 1fr; } }

        .card {
            background: var(--panel); padding: 15px; border-radius: 12px;
            border: 1px solid var(--border); box-shadow: 0 8px 16px rgba(0,0,0,0.5); height: fit-content;
        }

        h2 { font-size: 0.85rem; color: var(--gold); margin: 0 0 15px 0; text-transform: uppercase; border-left: 3px solid var(--gold); padding-left: 10px; }

        input {
            width: 100%; padding: 12px; background: #222; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 1rem;
        }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.9rem;
        }

        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 4px 0 #967c29; }
        .btn-gold:active { transform: translateY(2px); box-shadow: 0 2px 0 #967c29; }
        .btn-green { background: var(--green); color: #fff; margin-top: 15px; }
        .btn-blue { background: var(--blue); color: #fff; margin-top: 10px; }
        
        .btn-plus {
            background: #333; color: var(--green); border: 1px solid #555;
            border-radius: 4px; padding: 4px 10px; cursor: pointer; font-weight: bold;
        }

        .btn-del {
            background: rgba(255, 77, 77, 0.1); color: var(--red);
            border: 1px solid var(--red); border-radius: 4px; padding: 4px 8px; cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.65rem; color: var(--neutral); padding: 8px; border-bottom: 1px solid var(--border); }
        td { padding: 10px 6px; border-bottom: 1px solid #222; font-size: 0.85rem; }

        .monto-resultado { width: 70px; background: #000; border: 1px solid #444; color: var(--gold); text-align: center; padding: 8px 4px; border-radius: 6px; font-weight: bold; }

        .badge { 
            padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; 
            display: flex; align-items: center; justify-content: center; gap: 5px; min-width: 80px;
        }
        .win { background: rgba(46, 204, 113, 0.15); color: var(--green); }
        .loss { background: rgba(255, 77, 77, 0.15); color: var(--red); }
        .cero { background: rgba(136, 136, 136, 0.15); color: var(--neutral); }
        .arremango { background: var(--blue); color: #fff; border: 1px solid #fff; }

        .alerta {
            background: rgba(255, 77, 77, 0.1); color: var(--red);
            padding: 15px; border-radius: 8px; border: 1px solid var(--red);
            margin-top: 15px; text-align: center; font-weight: bold; display: none;
        }

        /* HISTORIAL ACORDEÓN MEJORADO */
        .month-group { margin-top: 15px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .month-header {
            background: #222; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border-bottom: 1px solid #333;
        }
        .month-name { color: var(--gold); font-weight: 900; }
        
        /* Contenido oculto por defecto usando una clase CSS */
        .month-content { padding: 10px; background: #0c0c0c; display: none; }
        .month-content.show { display: block !important; }

        .history-card {
            background: var(--panel); border-radius: 8px; margin-bottom: 12px;
            border-left: 5px solid var(--gold); overflow: hidden;
        }
        .h-head { background: #1a1a1a; padding: 10px; display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--neutral); }
        .h-body { padding: 10px; }
        .h-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1f1f1f; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div style="color:var(--gold); font-weight: bold; letter-spacing: 2px;">GUARDANDO EN NUBE...</div></div>

<div class="container">
    <header>
        <div class="suits">♠️ ♥️ ♣️ ♦️</div>
        <h1>Ludópatas FC</h1>
        <div class="credits">Created by Matias Reyes & Gemini Associates</div>
    </header>

    <div class="session-info">
        <input type="text" id="current-date" class="info-input" readonly>
        <input type="text" id="session-note" class="info-input">
    </div>

    <div class="main-grid">
        <div class="card">
            <h2>Nuevo Jugador</h2>
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 0.7rem; color: var(--neutral); margin-bottom: 4px;">Nombre del Jugador</label>
                <input type="text" id="name" placeholder="Ej: BILLO">
            </div>
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-size: 0.7rem; color: var(--neutral); margin-bottom: 4px;">Manos Compradas ($100)</label>
                <input type="number" id="buys" value="1" min="1">
            </div>
            <button class="btn btn-gold" onclick="add()">Sentar en Mesa</button>
            <div style="margin-top:20px; text-align: center;">
                <span style="color:var(--neutral); font-size: 0.7rem;">POZO EN MESA</span><br>
                <span id="total-in" style="color:var(--gold); font-size: 1.6rem; font-weight: bold;">$0</span>
            </div>
        </div>

        <div class="card">
            <h2>Mesa en Vivo</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Jugador</th>
                            <th>Manos</th>
                            <th>Inv.</th>
                            <th>Cierre</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="lista-mesa"></tbody>
                </table>
            </div>
            <button class="btn btn-green" onclick="liquidar()">Finalizar y Cuadrar</button>
            <div id="msg-alerta" class="alerta"></div>

            <div id="resumen-final" style="display:none; margin-top:20px; padding:15px; background:#000; border-radius:8px; border: 1px solid var(--blue);">
                <div id="resumen-lista" style="font-size: 0.85rem; margin-bottom: 15px; line-height: 1.6;"></div>
                <button class="btn btn-blue" onclick="guardarPartida()">Confirmar y Guardar</button>
            </div>
        </div>
    </div>

    <div style="margin-top: 30px;">
        <h2 style="color:var(--neutral); border-color:var(--neutral);">Historial de Sesiones</h2>
        <div id="historial-contenedor">
            <p style="text-align:center; color:var(--neutral); font-size: 0.8rem;">Cargando datos...</p>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwv6C_KWQbdpysFrNtSnA48KVBzfBahbilu0JeghewirAwqEvKPwHPHfyPB0onbwHK_/exec";
    let mesa = [];
    const VALOR_MANO = 100;
    const meses = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

    function setupDateTime() {
        const now = new Date();
        document.getElementById('current-date').value = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
        document.getElementById('session-note').value = now.getHours() >= 12 ? 'JORNADA NOCTURNA' : 'JORNADA MAÑANA';
    }

    function add() {
        const n = document.getElementById('name').value.toUpperCase();
        const b = parseInt(document.getElementById('buys').value);
        if(!n) return;
        mesa.push({ id: Date.now(), nombre: n, manos: b, balanceNeto: 0 });
        document.getElementById('name').value = "";
        actualizarMesa();
    }

    function addMano(id) {
        const j = mesa.find(x => x.id === id);
        if(j) { j.manos += 1; actualizarMesa(); }
    }

    function eliminarJugador(id) {
        if(confirm("¿Quitar de la mesa?")) {
            mesa = mesa.filter(j => j.id !== id);
            actualizarMesa();
        }
    }

    function setNeto(id, val) {
        const j = mesa.find(x => x.id === id);
        if(j) j.balanceNeto = parseFloat(val) || 0;
        updateBadges();
    }

    function updateBadges() {
        mesa.forEach(j => {
            const celda = document.getElementById(`saldo-${j.id}`);
            if(!celda) return;
            const bal = j.balanceNeto;
            if (bal >= 200) celda.innerHTML = `<span class="badge arremango">🔥 ARREMANGO</span>`;
            else if (bal > 0) celda.innerHTML = `<span class="badge win">✅ +$${bal}</span>`;
            else if (bal < 0) celda.innerHTML = `<span class="badge loss">💀 -$${Math.abs(bal)}</span>`;
            else celda.innerHTML = `<span class="badge cero">🃏 $0</span>`;
        });
    }

    function actualizarMesa() {
        const tbody = document.getElementById('lista-mesa');
        tbody.innerHTML = "";
        let total = 0;
        mesa.forEach(j => {
            const inv = j.manos * VALOR_MANO;
            total += inv;
            tbody.innerHTML += `
                <tr>
                    <td><button class="btn-del" onclick="eliminarJugador(${j.id})">×</button></td>
                    <td><b>${j.nombre}</b></td>
                    <td>${j.manos} <button class="btn-plus" onclick="addMano(${j.id})">+</button></td>
                    <td>$${inv}</td>
                    <td><input type="number" step="10" class="monto-resultado" value="${j.balanceNeto}" onchange="setNeto(${j.id}, this.value)"></td>
                    <td id="saldo-${j.id}"></td>
                </tr>`;
        });
        document.getElementById('total-in').innerText = "$" + total.toLocaleString();
        document.getElementById('resumen-final').style.display = "none";
        updateBadges();
    }

    function liquidar() {
        let suma = 0;
        mesa.forEach(j => suma += j.balanceNeto);
        const alerta = document.getElementById('msg-alerta');
        const resDiv = document.getElementById('resumen-final');
        if(suma !== 0) {
            alerta.style.display = "block";
            alerta.innerText = suma > 0 ? `⚠️ SOBRAN $${suma}` : `⚠️ FALTAN $${Math.abs(suma)}`;
            resDiv.style.display = "none";
        } else {
            alerta.style.display = "none";
            resDiv.style.display = "block";
            let resHtml = "<b>RESUMEN DE CUENTAS CLARAS:</b><br>";
            mesa.forEach(j => {
                const icon = j.balanceNeto > 0 ? "✅" : (j.balanceNeto < 0 ? "💀" : "🃏");
                resHtml += `${icon} ${j.nombre}: ${j.balanceNeto >= 0 ? '+' : ''}$${j.balanceNeto}<br>`;
            });
            document.getElementById('resumen-lista').innerHTML = resHtml;
        }
    }

    async function guardarPartida() {
        document.getElementById('loader').style.display = "flex";
        const now = new Date();
        const horaLimpia = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const payload = {
            idMes: `${meses[now.getMonth()]} ${now.getFullYear()}`,
            fecha: document.getElementById('current-date').value,
            hora: horaLimpia,
            jornada: document.getElementById('session-note').value,
            jugadores: mesa
        };
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("¡Partida Guardada!");
            mesa = [];
            actualizarMesa();
            setTimeout(fetchHistorial, 1500);
        } catch (e) { alert("Error de conexión"); }
        document.getElementById('loader').style.display = "none";
    }

    async function fetchHistorial() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            renderHistorial(data);
        } catch (e) { console.log("Error al cargar historial"); }
    }

    function renderHistorial(data) {
        const cont = document.getElementById('historial-contenedor');
        if(!data || !data.length) { cont.innerHTML = "<p style='text-align:center; color:var(--neutral);'>Sin registros.</p>"; return; }
        cont.innerHTML = "";
        const grupos = {};
        data.reverse().forEach(row => {
            if(!grupos[row.ID_Mes]) grupos[row.ID_Mes] = { sesiones: {}, totalPremios: 0 };
            const sesionKey = row.Fecha + row.Hora;
            if(!grupos[row.ID_Mes].sesiones[sesionKey]) {
                grupos[row.ID_Mes].sesiones[sesionKey] = { fecha: row.Fecha, hora: row.Hora, jugadores: [] };
            }
            grupos[row.ID_Mes].sesiones[sesionKey].jugadores.push(row);
            if(row.Resultado > 0) grupos[row.ID_Mes].totalPremios += row.Resultado;
        });

        Object.keys(grupos).forEach(idMes => {
            const g = grupos[idMes];
            const sesionesArr = Object.values(g.sesiones);
            const idLimpio = idMes.replace(/\s+/g, '_'); // ID único sin espacios
            
            cont.innerHTML += `
                <div class="month-group">
                    <div class="month-header" onclick="toggleMonth('${idLimpio}')">
                        <span class="month-name">📅 ${idMes}</span>
                        <span style="color:var(--green); font-weight:bold;">$${g.totalPremios} ▾</span>
                    </div>
                    <div id="content-${idLimpio}" class="month-content">
                        ${sesionesArr.map((s, idx) => `
                            <div class="history-card">
                                <div class="h-head"><span>JUEGO #${sesionesArr.length - idx}</span> <span>${s.fecha} - ${s.hora}</span></div>
                                <div class="h-body">
                                    ${s.jugadores.map(j => `
                                        <div class="h-row">
                                            <span>${j.Jugador}</span>
                                            <span style="font-weight:bold; color:${j.Resultado > 0 ? 'var(--green)' : (j.Resultado < 0 ? 'var(--red)' : '#888')}">
                                                ${j.Resultado > 0 ? '✅' : (j.Resultado < 0 ? '💀' : '🃏')} ${j.Resultado >= 0 ? '+' : ''}$${j.Resultado}
                                            </span>
                                        </div>`).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
        });
    }

    // NUEVA FUNCIÓN TOGGLE REFORZADA
    function toggleMonth(id) {
        const el = document.getElementById('content-' + id);
        if (el) {
            el.classList.toggle('show');
        }
    }

    setupDateTime();
    fetchHistorial();
</script>
</body>
</html>
